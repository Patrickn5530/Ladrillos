<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ladrillos</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.18/dist/sweetalert2.all.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
    width:100%;height:100%;
    background:#000;
    display:flex;flex-direction:column;
    overflow:hidden;
    font-family:Arial,sans-serif;
    touch-action:none;
}
#gameCanvas{
    flex:1;
    display:block;
    width:100%;
    touch-action:none;
    /* Capa GPU dedicada — clave para Android */
    will-change:transform;
}
/* ── Footer anuncios ── */
#adFooter{
    flex-shrink:0;
    width:100%;height:60px;
    background:#0d0d0d;
    border-top:1px solid rgba(255,255,255,0.07);
    display:flex;align-items:center;justify-content:center;
    z-index:10;
}
#adFooter span{
    color:rgba(255,255,255,0.18);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
}
/* ── HUD overlay (badges de poderes) ── */
#hudOverlay{
    position:fixed;
    bottom:70px;left:50%;
    transform:translateX(-50%);
    display:flex;gap:8px;
    z-index:20;pointer-events:none;
}
.power-badge{
    background:rgba(0,0,0,0.65);
    border-radius:10px;padding:3px 10px;
    font-size:13px;color:#fff;
    border:1px solid rgba(255,255,255,0.2);
    animation:popIn .25s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
/* ── SweetAlert tema oscuro ── */
.swal-popup{
    width:90%!important;max-width:400px!important;
    background:linear-gradient(145deg,#1b263b,#0d1b2a)!important;
    color:#e0e8ff!important;
    border:1px solid rgba(100,150,255,.3)!important;
    border-radius:16px!important;
    font-size:clamp(13px,3.5vw,16px)!important;
}
.swal-popup .swal2-title{color:#fff!important}
.swal-popup .swal2-html-container{color:#c0d0ff!important}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hudOverlay"></div>
<div id="adFooter">
    <!-- Pega aquí el código de Google AdSense cuando esté aprobado -->
    <span>Espacio publicitario</span>
</div>

<!-- Audio -->
<audio id="sndCollision"><source src="audio/explosion.mp3" type="audio/mpeg"></audio>
<audio id="sndBounce"><source src="audio/rebote.mp3" type="audio/mpeg"></audio>
<audio id="sndWall"><source src="audio/rebote.mp3" type="audio/mpeg"></audio>
<audio id="sndGameOver"><source src="audio/perdiste.mp3" type="audio/mpeg"></audio>

<script src="script.js"></script>
</body>
</html>
